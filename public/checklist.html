<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Researcher's Objective Checklist</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <header class="masthead">
      <div class="masthead-meta">
        <a href="index.html" style="color: var(--muted); text-decoration: none;">← Back to Home</a>
        <span>Form 2 of 2</span>
      </div>
      <div class="eyebrow">Form 2 · Field Observation</div>
      <h1>Researcher's Objective Security Checklist</h1>
      <p class="lede" style="margin-top: 1rem;">On-site evaluation. Score 0 = Absent · 1 = Partial · 2 = Full. Live indices computed below.</p>

      <div style="margin-top: 1.5rem;">
        <div class="progress-bar"><div class="progress-fill"></div></div>
        <div class="progress-label">0% complete</div>
      </div>
    </header>

    <div id="resume-banner" class="banner info hidden">
      <span>📝</span>
      <div style="flex: 1;">A draft was found and restored. <a href="#" id="discard-draft" style="color: var(--accent); text-decoration: underline;">Discard draft</a></div>
    </div>

    <!-- LIVE INDEX DISPLAY -->
    <div class="index-display">
      <div class="index-card">
        <div class="index-label">Adoption Index</div>
        <div class="index-value"><span id="adoption-idx">0</span><span class="index-suffix">%</span></div>
      </div>
      <div class="index-card">
        <div class="index-label">Compliance Index</div>
        <div class="index-value"><span id="compliance-idx">0</span><span class="index-suffix">%</span></div>
      </div>
    </div>

    <form id="checklist-form" novalidate>
      <div id="form-body"></div>

      <div class="btn-row">
        <button type="button" class="btn btn-ghost" id="save-btn">Save draft</button>
        <button type="submit" class="btn btn-primary" id="submit-btn">Submit Field Report</button>
      </div>
    </form>
  </main>

  <script src="data.js"></script>
  <script src="form-engine.js"></script>
  <script>
    const FE = window.FormEngine;
    const formBody = document.getElementById('form-body');

    // ============ HEADER FIELDS ============
    formBody.appendChild(FE.makeSection({
      id: 'sec-meta',
      eyebrow: 'Step 1',
      title: 'Site & Researcher Information',
      body: [
        FE.buildTextField({ id: 'church_code', label: 'Church Name / Code', required: true }),
        FE.buildDateField({ id: 'visit_date', label: 'Date of Visit', required: true }),
        FE.buildTextField({ id: 'location', label: 'Location (State Capital)', required: true }),
        FE.buildTextField({ id: 'capacity', label: 'Capacity (number of seats)', required: true, placeholder: 'e.g., 1200' }),
        FE.buildTextField({ id: 'researcher', label: 'Researcher Name', required: true }),

        FE.el('div', { class: 'field' }, [
          FE.el('label', { class: 'field-label', html: 'GPS Coordinates <span class="req">*</span>' }),
          FE.el('div', { class: 'input-row' }, [
            FE.el('input', { type: 'text', id: 'gps_lat', name: 'gps_lat', placeholder: 'Latitude', 'data-required': 'true' }),
            FE.el('input', { type: 'text', id: 'gps_lng', name: 'gps_lng', placeholder: 'Longitude', 'data-required': 'true' })
          ]),
          FE.el('button', {
            type: 'button',
            class: 'btn btn-secondary',
            style: 'margin-top: 0.75rem;',
            onClick: captureGPS
          }, '📍 Auto-capture GPS')
        ])
      ]
    }));

    // ============ SECTION 1: ADOPTION (18 items) ============
    const adoptionSection = FE.makeSection({
      id: 'sec-adoption',
      eyebrow: 'Section 1 · Objective 3',
      title: 'Voluntary Adoption Checklist (18 items)',
      body: []
    });
    const adoptionBody = adoptionSection.querySelector('.section-body');

    DATA.adoptionChecklist18.forEach((item, idx) => {
      const num = idx + 1;
      const wrapper = FE.el('div', { style: 'padding: 1rem; border-bottom: 1px solid var(--rule); margin-bottom: 0.5rem;' });
      wrapper.appendChild(FE.el('div', { style: 'display: flex; gap: 0.5rem; margin-bottom: 0.75rem; align-items: flex-start;' }, [
        FE.el('span', { style: 'font-family: IBM Plex Mono, monospace; font-size: 0.8rem; color: var(--accent); flex-shrink: 0; padding-top: 2px;' }, `A${num}.`),
        FE.el('span', { style: 'font-size: 0.95rem;' }, item)
      ]));

      // Score radio buttons
      const scoreRow = FE.el('div', { style: 'display: flex; gap: 0.5rem; margin-bottom: 0.5rem;' });
      ['0 (Absent)', '1 (Partial)', '2 (Full)'].forEach((opt, i) => {
        const radioId = `adopt_${num}_${i}`;
        const label = FE.el('label', { for: radioId, style: 'display: flex; align-items: center; gap: 0.4rem; padding: 0.4rem 0.8rem; border: 1px solid var(--rule); border-radius: var(--radius); cursor: pointer; flex: 1; justify-content: center; background: var(--paper);' }, [
          FE.el('input', { type: 'radio', id: radioId, name: `adopt_${num}`, value: i, 'data-required': 'true', 'data-score-group': 'adoption' }),
          FE.el('span', { style: 'font-size: 0.85rem;' }, opt)
        ]);
        scoreRow.appendChild(label);
      });
      wrapper.appendChild(scoreRow);

      wrapper.appendChild(FE.el('textarea', {
        id: `adopt_${num}_notes`,
        name: `adopt_${num}_notes`,
        placeholder: 'Notes / Observations',
        style: 'margin-top: 0.5rem; min-height: 50px;'
      }));
      wrapper.appendChild(FE.el('input', {
        type: 'text',
        id: `adopt_${num}_photo`,
        name: `adopt_${num}_photo`,
        placeholder: 'Photo Reference Number (optional)',
        style: 'margin-top: 0.5rem;'
      }));

      adoptionBody.appendChild(wrapper);
    });

    formBody.appendChild(adoptionSection);

    // ============ SECTION 2: REGULATORY (9 items) ============
    const complianceSection = FE.makeSection({
      id: 'sec-compliance',
      eyebrow: 'Section 2 · Objective 4',
      title: 'Regulatory Compliance Checklist (9 items)',
      body: []
    });
    const complianceBody = complianceSection.querySelector('.section-body');

    DATA.complianceChecklist9.forEach((item, idx) => {
      const num = idx + 1;
      const wrapper = FE.el('div', { style: 'padding: 1rem; border-bottom: 1px solid var(--rule); margin-bottom: 0.5rem;' });
      wrapper.appendChild(FE.el('div', { style: 'display: flex; gap: 0.5rem; margin-bottom: 0.75rem; align-items: flex-start;' }, [
        FE.el('span', { style: 'font-family: IBM Plex Mono, monospace; font-size: 0.8rem; color: var(--accent); flex-shrink: 0; padding-top: 2px;' }, `R${num}.`),
        FE.el('span', { style: 'font-size: 0.95rem;' }, item)
      ]));

      const scoreRow = FE.el('div', { style: 'display: flex; gap: 0.5rem; margin-bottom: 0.5rem;' });
      ['0 (Non-compliant)', '1 (Partial)', '2 (Full)'].forEach((opt, i) => {
        const radioId = `reg_${num}_${i}`;
        const label = FE.el('label', { for: radioId, style: 'display: flex; align-items: center; gap: 0.4rem; padding: 0.4rem 0.8rem; border: 1px solid var(--rule); border-radius: var(--radius); cursor: pointer; flex: 1; justify-content: center; background: var(--paper);' }, [
          FE.el('input', { type: 'radio', id: radioId, name: `reg_${num}`, value: i, 'data-required': 'true', 'data-score-group': 'compliance' }),
          FE.el('span', { style: 'font-size: 0.85rem;' }, opt)
        ]);
        scoreRow.appendChild(label);
      });
      wrapper.appendChild(scoreRow);

      wrapper.appendChild(FE.el('textarea', {
        id: `reg_${num}_notes`,
        name: `reg_${num}_notes`,
        placeholder: 'Notes / Observations',
        style: 'margin-top: 0.5rem; min-height: 50px;'
      }));
      wrapper.appendChild(FE.el('input', {
        type: 'text',
        id: `reg_${num}_photo`,
        name: `reg_${num}_photo`,
        placeholder: 'Photo Reference Number (optional)',
        style: 'margin-top: 0.5rem;'
      }));

      complianceBody.appendChild(wrapper);
    });

    formBody.appendChild(complianceSection);

    // ============ SUMMARY ============
    formBody.appendChild(FE.makeSection({
      id: 'sec-summary',
      eyebrow: 'Final',
      title: 'Overall Summary & Posture Assessment',
      body: [
        FE.buildTextarea({
          id: 'general_observations',
          label: 'General Observations / Notes',
          help: 'Any contextual observations not captured by the checklist.',
          minHeight: 100
        }),
        FE.buildTextField({ id: 'photo_count', label: 'Total Photos Taken (count)' }),
        FE.buildTextarea({
          id: 'photo_list',
          label: 'Photo Reference List',
          help: 'List all photo reference numbers from this visit, separated by commas.',
          minHeight: 60
        }),
        FE.buildSelect({
          id: 'posture',
          label: 'Combined Security Posture (Researcher Assessment)',
          options: ['Adequate', 'Moderately Adequate', 'Inadequate'],
          required: true
        }),
        FE.buildTextarea({
          id: 'posture_justification',
          label: 'Justification for Posture Assessment',
          required: true,
          minHeight: 100
        })
      ]
    }));

    // ============ GPS CAPTURE ============
    function captureGPS() {
      if (!navigator.geolocation) {
        FE.toast('Geolocation not supported by this browser', 'error');
        return;
      }
      FE.toast('Getting GPS coordinates…');
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          document.getElementById('gps_lat').value = pos.coords.latitude.toFixed(6);
          document.getElementById('gps_lng').value = pos.coords.longitude.toFixed(6);
          FE.toast('GPS captured', 'success');
          FE.updateProgress(form);
        },
        (err) => {
          FE.toast(`GPS error: ${err.message}`, 'error');
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    }

    // ============ LIVE INDEX CALCULATION ============
    function updateIndices() {
      // Adoption: 18 items × max 2 = 36 max
      let adoptionTotal = 0;
      for (let i = 1; i <= 18; i++) {
        const checked = document.querySelector(`input[name="adopt_${i}"]:checked`);
        if (checked) adoptionTotal += parseInt(checked.value);
      }
      const adoptionPct = Math.round((adoptionTotal / 36) * 100);
      document.getElementById('adoption-idx').textContent = adoptionPct;

      // Compliance: 9 items × max 2 = 18 max
      let complianceTotal = 0;
      for (let i = 1; i <= 9; i++) {
        const checked = document.querySelector(`input[name="reg_${i}"]:checked`);
        if (checked) complianceTotal += parseInt(checked.value);
      }
      const compliancePct = Math.round((complianceTotal / 18) * 100);
      document.getElementById('compliance-idx').textContent = compliancePct;
    }

    // ============ INITIALIZE ============
    const form = document.getElementById('checklist-form');

    const savedAt = FE.loadDraft('checklist', form);
    if (savedAt) {
      const banner = document.getElementById('resume-banner');
      banner.classList.remove('hidden');
      banner.querySelector('div').innerHTML = `📝 Draft restored from ${new Date(savedAt).toLocaleString()}. <a href="#" id="discard-draft" style="color: var(--accent); text-decoration: underline;">Discard draft</a>`;
      document.getElementById('discard-draft').addEventListener('click', (e) => {
        e.preventDefault();
        if (confirm('Discard saved draft and start fresh?')) {
          FE.clearDraft('checklist');
          location.reload();
        }
      });
      updateIndices();
    }

    FE.setupAutosave('checklist', form);
    form.addEventListener('change', () => {
      FE.updateProgress(form);
      updateIndices();
    });
    form.addEventListener('input', () => FE.updateProgress(form));
    FE.updateProgress(form);

    document.getElementById('save-btn').addEventListener('click', () => {
      if (FE.saveDraft('checklist', form)) FE.toast('Draft saved', 'success');
      else FE.toast('Save failed', 'error');
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const submitBtn = document.getElementById('submit-btn');

      const errors = FE.validateForm(form);
      if (errors.length) {
        FE.toast(`Please complete required fields (${errors.length} missing)`, 'error');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Submitting…';

      try {
        const data = FE.collectFormData(form);
        // Include computed indices
        data.adoption_index = document.getElementById('adoption-idx').textContent;
        data.compliance_index = document.getElementById('compliance-idx').textContent;
        await FE.submitToBackend('checklist', data);
        FE.clearDraft('checklist');
        FE.toast('Field report submitted', 'success');
        setTimeout(() => {
          form.innerHTML = '<div class="section" style="text-align: center; padding: 4rem 2rem;"><h2 style="color: var(--success);">✓ Submission Received</h2><p class="text-muted" style="margin-top: 1rem;">Field report saved successfully.</p><a href="index.html" class="btn btn-secondary" style="margin-top: 2rem;">Return to Home</a></div>';
        }, 1500);
      } catch (err) {
        console.error(err);
        FE.toast(`Submission failed: ${err.message}`, 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit Field Report';
      }
    });
  </script>
</body>
</html>
